server {
    listen 80;
    server_name _;

    location / {
        # Включаем авторизацию для всего сайта без исключений
        auth_basic "VPN Protected Management Panel";
        auth_basic_user_file /etc/nginx/.vpn_panel_passwd;

        # Просто прокидываем всё на Flask
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
