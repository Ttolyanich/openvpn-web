<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Web Panel — Управление пользователями</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2M1MmYzMSI+PHBhdGggZD0iTTEyIDJMNCA1djZjMCA1LjU1IDMuODQgMTAuNzQgOSAxMiA1LjE2LTEuMjYgOS02LjQ1IDktMTJWNWwtOC0zem0tMiAxMmwtNC00IDEuNDEtMS40MUwxMCAxMS4xTDE3LjU5IDMuNWwxLjQxIDEuNDEtOSA5eiIvPjwvc3ZnPg==" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="brand-zone">
                <div class="logo-box">A</div>
                <span class="brand-title">VPN <span class="accent-text">AUTH SERVER</span></span>
            </div>
            <div class="user-profile-zone">
                <span id="currentUserSpan" class="current-user-name">Загрузка...</span>
                <button onclick="handleLogout()" class="btn-logout">Выйти</button>
            </div>
        </div>
    </nav>

    <main class="main-container">
        
        <div class="panel-card">
            <div class="card-header">
                <h2 class="header-title uppercase-accent">Добавить пользователя панели</h2>
                <p class="header-subtitle font-mono">Доступ на все VPN-ноды по этим данным</p>
            </div>
            <div class="card-body bg-offset">
                <div class="form-row-multi">
                    <div class="input-wrapper wide-label">
                        <input type="text" id="newUsername" placeholder="логин">
                        <span class="input-label">Username</span>
                    </div>
                    <div class="input-wrapper wide-label">
                        <input type="password" id="newPassword" placeholder="пароль">
                        <span class="input-label">Password</span>
                    </div>
                    <button onclick="createUser()" class="btn-submit">Создать</button>
                </div>
                <div id="actionMessage" class="status-msg"></div>
            </div>
        </div>

        <div class="panel-card">
            <div class="card-header">
                <h2 class="header-title uppercase-muted">Активные аккаунты</h2>
            </div>

            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Имя пользователя</th>
                            <th>Роль</th>
                            <th>Дата создания</th>
                            <th class="text-right">Действия</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr><td colspan="4" class="text-center" style="padding:32px; color:#888;">Загрузка списка...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script src="{{ url_for('static', filename='js/auth_admin.js') }}"></script>
</body>
</html>
